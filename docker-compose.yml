# Judge / demo stack: UI on http://localhost  (frontend nginx -> backend -> Ollama + Neo4j).
#
# 1. Create .env in repo root from backend/.env.example (Neo4j + Ollama + optional keys).
# 2. First run pulls Gemma + embeddings (ollama-setup) — can take several minutes.
# 3. Open http://localhost  — API is same-origin (VITE_API_URL="" in frontend image).
#
# For a live deployment, set NEO4J_URI / NEO4J_USERNAME / NEO4J_PASSWORD in .env
# to the Neo4j endpoint you control.

services:

  # ── Neo4j ──────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    restart: unless-stopped
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: "${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-groundedmd}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1G"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USERNAME:-neo4j}", "-p", "${NEO4J_PASSWORD:-groundedmd}", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Ollama ─────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # GPU: uncomment the deploy block below for NVIDIA, or remove for CPU-only
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  # ── Model pull (runs once, then exits) ─────────────────────────────────────
  ollama-setup:
    image: ollama/ollama:latest
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: >
      sh -c "
        ollama pull ${OLLAMA_LLM_MODEL:-gemma4:e4b} &&
        ollama pull ${OLLAMA_EMBED_MODEL:-nomic-embed-text} &&
        echo 'Models ready.'
      "
    volumes:
      - ollama_models:/root/.ollama

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-groundedmd}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_LLM_MODEL: ${OLLAMA_LLM_MODEL:-gemma4:e4b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      LOCAL_RERANK_ENABLED: ${LOCAL_RERANK_ENABLED:-false}
      RERANKER_MODEL: ${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-GroundedMD-Hackathon}
    depends_on:
      neo4j:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - hf_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  neo4j_data:
  neo4j_logs:
  ollama_models:
  hf_cache:
