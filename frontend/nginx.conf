server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy backend API routes — keeps port 8000 internal, everything through port 80
    location ~ ^/(health|chat|ingest|pipelines|knowledge-base) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        # SSE: disable proxy buffering so events stream immediately
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
    }

    # SPA routing — all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
